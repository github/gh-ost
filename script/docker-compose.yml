services:
  mysql-primary:
    image: $TEST_MYSQL_IMAGE
    container_name: mysql-primary
    command: --server-id=1
    init: true
    env_file:
      - .env
    environment:
      - MYSQL_TCP_PORT=3307
    volumes:
      - $CONF_PATH/create_user.sql:/docker-entrypoint-initdb.d/create_user.sql:ro
      - $CONF_PATH/common.cnf:$MYSQL_CONFD/common.cnf:ro
    healthcheck:
      test: "mysql -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD -e 'select 1;' || exit 1"
      interval: 5s
      # Generous first-boot window: emulated amd64 5.7 on arm64 can take 60s+ to
      # init a fresh datadir. Health failures during start_period don't count, so
      # `up --wait` won't abort before the server is reachable.
      start_period: 120s
      retries: 10
    ports:
      - '3307:3307'
  mysql-replica:
    extends: mysql-primary
    container_name: mysql-replica
    command: --server-id=2
    # Volumes (create_user.sql, common.cnf) are inherited from mysql-primary.
    # Replication is NOT configured here (i.e. at boot) intentionally:
    # docker-gh-ost-replica-tests::setup applies start_replication.sql once
    # both servers are up and listening, so the primary is reachable and
    # replica connects on the first try instead of racing the primary's boot.
    environment:
      - MYSQL_TCP_PORT=3308
    ports: !override
      - '3308:3308'
